version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: taskflow
      POSTGRES_PASSWORD: password
      POSTGRES_DB: taskflow_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - taskflow-network
    restart: always

  seq:
    image: datalust/seq:latest
    environment:
      ACCEPT_EULA: "Y"
    ports:
      - "5341:5341"
      - "8081:80"
    networks:
      - taskflow-network
    restart: always

  api:
    build:
      context: ./TaskFlow
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Database=taskflow_db;Username=taskflow;Password=password;
      - SeqSettings__ServerUrl=http://seq:5341
      - JwtSettings__Secret=SuperSecretKeyForTaskFlowApplication2026!
      - JwtSettings__Issuer=TaskFlow
      - JwtSettings__Audiences__0=FrontendApp
    ports:
      - "5000:8080"
      - "5001:8081"
    depends_on:
      - db
      - seq
    networks:
      - taskflow-network
    restart: always

  frontend:
    build:
      context: ./TaskFlow.Web
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    environment:
      - VITE_API_BASE_URL=http://localhost:5000/api
      - VITE_SIGNALR_HUB_URL=http://localhost:5000/hubs
    networks:
      - taskflow-network
    depends_on:
      - api
    restart: always

networks:
  taskflow-network:
    driver: bridge

volumes:
  pgdata:
