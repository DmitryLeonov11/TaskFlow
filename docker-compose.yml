services:
  db:
    image: postgres:15-alpine
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-taskflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-taskflow_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - taskflow-network
    restart: always

  seq:
    image: datalust/seq:latest
    environment:
      ACCEPT_EULA: "Y"
    ports:
      - "5341:5341"
      - "8081:80"
    volumes:
      - seq-data:/data
    networks:
      - taskflow-network
    restart: always

  api:
    build:
      context: ./TaskFlow
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - CONNECTION_STRING=Host=db;Database=${POSTGRES_DB:-taskflow_db};Username=${POSTGRES_USER:-taskflow};Password=${POSTGRES_PASSWORD:-password};
      - SeqSettings__ServerUrl=http://seq:5341
      - JWT_KEY=${JWT_KEY:-SuperSecretKeyForTaskFlowApplication2026!ThisIsAtLeast32Characters}
      - JWT_ISSUER=${JWT_ISSUER:-TaskFlow}
      - JWT_AUDIENCE=${JWT_AUDIENCE:-FrontendApp}
      - JWT_EXPIRATION_MINUTES=${JWT_EXPIRATION_MINUTES:-1440}
    ports:
      - "5000:8080"
      - "5001:8081"
    depends_on:
      - db
      - seq
    networks:
      - taskflow-network
    restart: always

  frontend:
    build:
      context: ./TaskFlow.Web
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:5000/api}
      - VITE_SIGNALR_HUB_URL=${VITE_SIGNALR_HUB_URL:-http://localhost:5000/hubs}
    networks:
      - taskflow-network
    depends_on:
      - api
    restart: always

networks:
  taskflow-network:
    driver: bridge

volumes:
  pgdata:
  seq-data:
