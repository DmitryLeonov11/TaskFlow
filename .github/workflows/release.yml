name: Release

on:
  push:
    tags:
      - 'v*'

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '20'
  SOLUTION: 'TaskFlow.slnx'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    name: Build & Publish Release

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: 'TaskFlow.Web/package-lock.json'

    - name: Get the version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Restore dependencies
      run: dotnet restore ${{ env.SOLUTION }}

    - name: Build backend
      run: dotnet build ${{ env.SOLUTION }} --no-restore --configuration Release -p:Version=${{ steps.get_version.outputs.VERSION }}

    - name: Run tests
      run: dotnet test ${{ env.SOLUTION }} --no-build --verbosity normal

    - name: Install dependencies
      working-directory: ./TaskFlow.Web
      run: npm ci

    - name: Build frontend
      working-directory: ./TaskFlow.Web
      run: npm run build

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push API image
      uses: docker/build-push-action@v5
      with:
        context: ./TaskFlow
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/taskflow-api:${{ steps.get_version.outputs.VERSION }}
          ${{ secrets.DOCKER_USERNAME }}/taskflow-api:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push Frontend image
      uses: docker/build-push-action@v5
      with:
        context: ./TaskFlow.Web
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/taskflow-frontend:${{ steps.get_version.outputs.VERSION }}
          ${{ secrets.DOCKER_USERNAME }}/taskflow-frontend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
