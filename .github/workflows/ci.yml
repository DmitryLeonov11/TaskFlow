name: CI/CD Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test-backend:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore TaskFlow.slnx

    - name: Build backend
      run: dotnet build TaskFlow.slnx --no-restore

    - name: Run tests
      run: dotnet test TaskFlow.slnx --no-build --verbosity normal

  build-frontend:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'TaskFlow.Web/package-lock.json'

    - name: Install dependencies
      working-directory: ./TaskFlow.Web
      run: npm ci || npm install

    - name: Build frontend
      working-directory: ./TaskFlow.Web
      run: npm run build

  docker-build:
    needs: [build-and-test-backend, build-frontend]
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Build API Image
      run: docker build -t taskflow-api ./TaskFlow

    - name: Build Frontend Image
      run: docker build -t taskflow-frontend ./TaskFlow.Web
