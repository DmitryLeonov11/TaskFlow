name: CI Pipeline

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

env:
  DOTNET_VERSION: "8.0.x"
  NODE_VERSION: "20"
  SOLUTION: "TaskFlow.slnx"
  UNIT_TESTS_PROJECT: "tests/TaskFlow.Api.UnitTests/TaskFlow.Api.UnitTests.csproj"
  INTEGRATION_TESTS_PROJECT: "tests/TaskFlow.Api.IntegrationTests/TaskFlow.Api.IntegrationTests.csproj"

jobs:
  # ==================== BACKEND ====================
  backend-build-test:
    name: Backend - Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.slnx') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Verify Code Formatting
        run: dotnet format ${{ env.SOLUTION }} --verify-no-changes --severity warn
        continue-on-error: true

      - name: Build solution
        run: dotnet build ${{ env.SOLUTION }} --no-restore --configuration Release

      - name: Run unit tests with coverage
        run: dotnet test ${{ env.UNIT_TESTS_PROJECT }} --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./TestResults/unit

      - name: Run integration tests with coverage
        run: dotnet test ${{ env.INTEGRATION_TESTS_PROJECT }} --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./TestResults/integration

      - name: Upload unit test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: ./TestResults/unit
          if-no-files-found: ignore

      - name: Upload integration test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: ./TestResults/integration
          if-no-files-found: ignore

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports
          path: |
            ./TestResults/**/coverage.cobertura.xml
            ./TestResults/**/coverage.json
          if-no-files-found: ignore

  # ==================== FRONTEND ====================
  frontend-build-lint:
    name: Frontend - Build & Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: TaskFlow.Web/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('TaskFlow.Web/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        working-directory: TaskFlow.Web
        run: npm ci

      - name: Run TypeScript type check
        working-directory: TaskFlow.Web
        run: npx vue-tsc --noEmit

      - name: Build frontend
        working-directory: TaskFlow.Web
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: TaskFlow.Web/dist
          if-no-files-found: error

  # ==================== DOCKER ====================
  docker-build:
    name: Docker - Build Images
    runs-on: ubuntu-latest
    needs: [backend-build-test, frontend-build-lint]
    if: github.event_name == 'push' || github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: ./TaskFlow
          push: false
          tags: taskflow-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Build Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./TaskFlow.Web
          push: false
          tags: taskflow-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

  # ==================== SUMMARY ====================
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [backend-build-test, frontend-build-lint, docker-build]
    if: always()

    steps:
      - name: Check pipeline status
        run: |
          echo "## Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | ${{ needs.backend-build-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ needs.frontend-build-lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker | ${{ needs.docker-build.result }} |" >> $GITHUB_STEP_SUMMARY
          
      - name: Verify all jobs succeeded
        run: |
          if [ "${{ needs.backend-build-test.result }}" != "success" ] || \
             [ "${{ needs.frontend-build-lint.result }}" != "success" ]; then
            echo "One or more required jobs failed!"
            exit 1
          fi
          
          if [ "${{ needs.docker-build.result }}" == "failure" ] || [ "${{ needs.docker-build.result }}" == "cancelled" ]; then
            echo "Docker build failed!"
            exit 1
          fi
          echo "All required jobs completed successfully!"
